{% extends "layout.html" %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card" style="max-width: 520px;">

    <div class="auth-icon" style="background: linear-gradient(135deg, #2dd4a7, #0ea5e9);">
      <i class="fa-solid fa-user-plus"></i>
    </div>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Register as a new employee</p>

    <form method="POST" action="/employee/register" autocomplete="off">

      <div class="row g-3 mb-3">
        <div class="col-12">
          <label class="form-label"><i class="fa-solid fa-id-badge me-1"></i> Full Name</label>
          <input name="name" type="text" class="form-control" placeholder="John Doe" required>
        </div>

        <div class="col-md-6">
          <label class="form-label"><i class="fa-solid fa-hashtag me-1"></i> Employee Number</label>
          <input name="employee_number" type="text" class="form-control" placeholder="EMP-001" required>
        </div>

        <div class="col-md-6">
          <label class="form-label"><i class="fa-solid fa-envelope me-1"></i> Email</label>
          <input name="email" type="email" class="form-control" placeholder="you@company.com" required>
        </div>

        <div class="col-12">
          <label class="form-label"><i class="fa-solid fa-user me-1"></i> Username</label>
          <input name="username" type="text" class="form-control" placeholder="Choose a username" required>
        </div>

        <div class="col-md-6">
          <label class="form-label"><i class="fa-solid fa-lock me-1"></i> Password</label>
          <div style="position: relative;">
            <input id="pwd" name="password" type="password" class="form-control"
              placeholder="Min. 6 characters" required style="padding-right: 44px !important;">
            <span onclick="togglePwd('pwd', this)"
              style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-secondary);">
              <i class="fa-solid fa-eye"></i>
            </span>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label"><i class="fa-solid fa-lock me-1"></i> Confirm Password</label>
          <input name="confirm_password" type="password" class="form-control" placeholder="Repeat password" required>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom" style="background: linear-gradient(135deg, #2dd4a7, #0ea5e9); box-shadow: 0 4px 20px rgba(45,212,167,0.3);">
        <i class="fa-solid fa-user-plus me-2"></i> Create Account
      </button>
    </form>

    <hr class="divider">
    <p class="auth-link">
      Already have an account? <a href="/">Sign in here</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(fieldId, icon) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    icon.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  } else {
    field.type = 'password';
    icon.innerHTML = '<i class="fa-solid fa-eye"></i>';
  }
}
</script>
{% endblock %}
