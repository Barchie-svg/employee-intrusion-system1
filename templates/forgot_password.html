{% extends "layout.html" %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-icon" style="background: linear-gradient(135deg, #f59e0b, #ef4444);">
      <i class="fa-solid fa-key"></i>
    </div>

    <h1 class="auth-title">Forgot Password</h1>
    <p class="auth-subtitle">Enter your registered email address and we'll send you a <strong>6-digit verification code</strong> to reset your password.</p>

    <form method="POST" action="/employee/forgot-password" autocomplete="off">
      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-envelope me-1"></i> Registered Email</label>
        <input
          id="email"
          name="email"
          type="email"
          class="form-control"
          placeholder="you@company.com"
          required
          autofocus
          autocomplete="email"
        >
      </div>

      <button type="submit" class="btn-primary-custom mt-2"
        style="background: linear-gradient(135deg, #f59e0b, #ef4444); box-shadow: 0 4px 20px rgba(245,158,11,0.3);">
        <i class="fa-solid fa-paper-plane me-2"></i> Send Verification Code
      </button>
    </form>

    <hr class="divider">
    <p class="auth-link">
      Remembered your password? <a href="/">Sign in here</a>
    </p>

  </div>
</div>
{% endblock %}
