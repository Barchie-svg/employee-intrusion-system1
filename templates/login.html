{% extends "layout.html" %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-icon">
      <i class="fa-solid fa-shield-halved"></i>
    </div>

    <h1 class="auth-title">System Login</h1>
    <p class="auth-subtitle">Sign in with your Email, Username, or Employee ID</p>

    <form method="POST" action="/" autocomplete="off">
      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-user me-1"></i> Email, Username, or ID</label>
        <input
          id="identifier"
          name="identifier"
          type="text"
          class="form-control"
          placeholder="Enter Email, Username, or Employee ID"
          required
          autofocus
          autocomplete="username"
        >
      </div>

      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-lock me-1"></i> Password</label>
        <div style="position: relative;">
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="Enter your password"
            required
            style="padding-right: 44px !important;"
          >
          <span onclick="togglePwd('password', this)"
            style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-secondary);">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom mt-2" id="login-btn">
        <i class="fa-solid fa-right-to-bracket me-2"></i> Login
      </button>

      <div style="text-align:center; margin-top: 1rem;">
        <a href="/employee/forgot-password"
          style="font-size: 0.85rem; color: var(--text-secondary); text-decoration: none; opacity: 0.8; transition: opacity 0.2s;"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
          <i class="fa-solid fa-key me-1"></i> Forgot your password?
        </a>
      </div>
    </form>

    <hr class="divider">
    <p class="auth-link">
      Need an account? Contact your administrator.
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(fieldId, icon) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    icon.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  } else {
    field.type = 'password';
    icon.innerHTML = '<i class="fa-solid fa-eye"></i>';
  }
}
</script>
{% endblock %}
