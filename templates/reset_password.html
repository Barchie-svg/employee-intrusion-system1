{% extends "layout.html" %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-icon" style="background: linear-gradient(135deg, #10b981, #06b6d4);">
      <i class="fa-solid fa-lock-open"></i>
    </div>

    <h1 class="auth-title">Reset Password</h1>
    <p class="auth-subtitle">Choose a new, strong password for your account.</p>

    <form method="POST" action="/employee/reset-password" autocomplete="off">

      <div class="mb-3">
        <label class="form-label"><i class="fa-solid fa-key me-1"></i> Verification Code</label>
        <input
          id="token"
          name="token"
          type="text"
          class="form-control"
          placeholder="Enter the 6-digit code from your email"
          required
          autofocus
        >
      </div>
      <div class="mb-3">
        <label class="form-label"><i class="fa-solid fa-lock me-1"></i> New Password</label>
        <div style="position: relative;">
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="Min. 8 chars, letter, number, special"
            required
            autofocus
            style="padding-right: 44px !important;"
          >
          <span onclick="togglePwd('password', this)"
            style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-secondary);">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-lock me-1"></i> Confirm New Password</label>
        <div style="position: relative;">
          <input
            id="confirm_password"
            name="confirm_password"
            type="password"
            class="form-control"
            placeholder="Repeat your new password"
            required
            style="padding-right: 44px !important;"
          >
          <span onclick="togglePwd('confirm_password', this)"
            style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-secondary);">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>
      </div>

      <!-- Password strength hint -->
      <div style="margin-bottom: 1rem; padding: 0.75rem 1rem; background: rgba(16,185,129,0.07); border: 1px solid rgba(16,185,129,0.2); border-radius: 10px; font-size: 0.82rem; color: var(--text-secondary); line-height: 1.6;">
        <i class="fa-solid fa-shield-halved me-1" style="color:#10b981;"></i>
        Password must be <strong>at least 8 characters</strong> and include:
        a <strong>letter</strong>, a <strong>number</strong>, and a <strong>special character</strong> (e.g. <code>@!#$%</code>).
      </div>

      <button type="submit" class="btn-primary-custom mt-1"
        style="background: linear-gradient(135deg, #10b981, #06b6d4); box-shadow: 0 4px 20px rgba(16,185,129,0.3);">
        <i class="fa-solid fa-check me-2"></i> Set New Password
      </button>
    </form>

    <hr class="divider">
    <p class="auth-link">
      <a href="/"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a>
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(fieldId, icon) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    icon.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  } else {
    field.type = 'password';
    icon.innerHTML = '<i class="fa-solid fa-eye"></i>';
  }
}
</script>
{% endblock %}
