{% extends "layout.html" %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-icon" style="background: linear-gradient(135deg, #f5a623, #e74c6b);">
      <i class="fa-solid fa-user-shield"></i>
    </div>

    <h1 class="auth-title">Admin Portal</h1>
    <p class="auth-subtitle">Restricted access — authorized personnel only</p>

    <form method="POST" action="/admin/login" autocomplete="off">

      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-user-gear me-1"></i> Admin Username</label>
        <input
          id="username"
          name="username"
          type="text"
          class="form-control"
          placeholder="Admin username"
          required
          autofocus
        >
      </div>

      <div class="mb-4">
        <label class="form-label"><i class="fa-solid fa-lock me-1"></i> Password</label>
        <div style="position: relative;">
          <input
            id="password"
            name="password"
            type="password"
            class="form-control"
            placeholder="Admin password"
            required
            style="padding-right: 44px !important;"
          >
          <span onclick="togglePwd('password', this)"
            style="position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-secondary);">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn-primary-custom"
        style="background: linear-gradient(135deg, #f5a623, #e74c6b); box-shadow: 0 4px 20px rgba(245,166,35,0.3);">
        <i class="fa-solid fa-shield-halved me-2"></i> Admin Login
      </button>
    </form>

    <hr class="divider">
    <p class="auth-link">
      <a href="/"><i class="fa-solid fa-arrow-left me-1"></i> Back to Employee Login</a>
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePwd(fieldId, icon) {
  const field = document.getElementById(fieldId);
  if (field.type === 'password') {
    field.type = 'text';
    icon.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';
  } else {
    field.type = 'password';
    icon.innerHTML = '<i class="fa-solid fa-eye"></i>';
  }
}
</script>
{% endblock %}
